name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | grep -oP '"\K[^"]+')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/METV-${{ steps.version.outputs.VERSION }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version.json
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          cat > version.json << EOF
          {
            "versionCode": ${{ github.run_number }},
            "versionName": "$VERSION",
            "apkUrl": "https://github.com/$REPO/releases/download/$TAG/METV-$VERSION.apk",
            "releaseNotes": "Yeni güncelleme"
          }
          EOF

      - name: Commit version.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add version.json
          git commit -m "Update version.json for ${{ github.ref_name }}" || echo "No changes"
          git push origin HEAD:main
