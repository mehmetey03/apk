name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | grep -oP '"\K[^"]+')
          CODE=$(grep 'versionCode' app/build.gradle.kts | head -1 | grep -oP '\d+')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "CODE=$CODE" >> $GITHUB_OUTPUT

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/METV-${{ steps.version.outputs.VERSION }}.apk
          name: "METV v${{ steps.version.outputs.VERSION }}"
          body: "METV v${{ steps.version.outputs.VERSION }} yayınlandı."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version.json
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          CODE="${{ steps.version.outputs.CODE }}"
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          cat > version.json << EOF
          {
            "versionCode": $CODE,
            "versionName": "$VERSION",
            "apkUrl": "https://github.com/$REPO/releases/download/$TAG/METV-$VERSION.apk",
            "releaseNotes": "Yeni güncelleme mevcut"
          }
          EOF

      - name: Commit & push version.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git diff --staged --quiet || git commit -m "chore: update version.json to ${{ github.ref_name }}"
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
