name: Build & Release APK

on:
  push:
    branches:
      - main   # ✅ main'e her push'ta otomatik çalışır, tag gerekmez

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Grant execute permission
        run: chmod +x gradlew

      # ✅ Mevcut versionCode'u oku, 1 artır, dosyaya yaz
      - name: Bump versionCode automatically
        id: bump
        run: |
          FILE="app/build.gradle.kts"

          # Mevcut değerleri oku
          OLD_CODE=$(grep 'versionCode' $FILE | grep -oP '\d+' | head -1)
          OLD_NAME=$(grep 'versionName' $FILE | grep -oP '"\K[^"]+' | head -1)

          # versionCode'u 1 artır
          NEW_CODE=$((OLD_CODE + 1))

          # versionName'i otomatik artır (örn: 1.0 → 1.1 → 1.2 ...)
          MAJOR=$(echo $OLD_NAME | cut -d. -f1)
          MINOR=$(echo $OLD_NAME | cut -d. -f2)
          NEW_MINOR=$((MINOR + 1))
          NEW_NAME="$MAJOR.$NEW_MINOR"

          # build.gradle.kts'i güncelle
          sed -i "s/versionCode = $OLD_CODE/versionCode = $NEW_CODE/" $FILE
          sed -i "s/versionName = \"$OLD_NAME\"/versionName = \"$NEW_NAME\"/" $FILE

          echo "OLD_CODE=$OLD_CODE" >> $GITHUB_OUTPUT
          echo "NEW_CODE=$NEW_CODE" >> $GITHUB_OUTPUT
          echo "OLD_NAME=$OLD_NAME" >> $GITHUB_OUTPUT
          echo "NEW_NAME=$NEW_NAME" >> $GITHUB_OUTPUT

          echo "✅ versionCode: $OLD_CODE → $NEW_CODE"
          echo "✅ versionName: $OLD_NAME → $NEW_NAME"

      - name: Build Release APK
        run: ./gradlew assembleRelease

      # ✅ version.json'ı güncelle
      - name: Update version.json
        run: |
          NEW_CODE="${{ steps.bump.outputs.NEW_CODE }}"
          NEW_NAME="${{ steps.bump.outputs.NEW_NAME }}"
          REPO="${{ github.repository }}"
          TAG="v$NEW_NAME"
          cat > version.json << EOF
          {
            "versionCode": $NEW_CODE,
            "versionName": "$NEW_NAME",
            "apkUrl": "https://github.com/$REPO/releases/download/$TAG/METV-$NEW_NAME.apk",
            "releaseNotes": "Otomatik güncelleme v$NEW_NAME"
          }
          EOF

      # ✅ Değişiklikleri commit'le (build.gradle.kts + version.json)
      - name: Commit version changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts version.json
          git diff --staged --quiet || git commit -m "chore: bump version to v${{ steps.bump.outputs.NEW_NAME }} [skip ci]"
          git push origin main

      # ✅ GitHub Release oluştur ve APK yükle
      - name: Create Release & Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.bump.outputs.NEW_NAME }}"
          name: "METV v${{ steps.bump.outputs.NEW_NAME }}"
          body: "Otomatik güncelleme — v${{ steps.bump.outputs.NEW_NAME }}"
          files: app/build/outputs/apk/release/METV-${{ steps.bump.outputs.NEW_NAME }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
